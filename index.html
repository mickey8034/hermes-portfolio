<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Hermes 作品集 · 项目目录</title>
<meta name="description" content="Hermes Agent 数据分析与咨询报告作品集">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<!-- Inline script to prevent FOUC -->
<script>
(function(){
  var cs = localStorage.getItem('color-scheme');
  if (cs) document.querySelector('meta[name="color-scheme"]').content = cs;
  var savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') document.documentElement.classList.add('dark');
  if (savedTheme === 'light') document.documentElement.classList.remove('dark');
})();
</script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:light dark;

  /* Light tokens */
  --bg-page: oklch(0.97 0.005 280);
  --bg-card: oklch(1 0 0 / 0.7);
  --bg-card-hover: oklch(1 0 0 / 0.9);
  --bg-glass: oklch(1 0 0 / 0.4);
  --text-primary: oklch(0.15 0.02 280);
  --text-secondary: oklch(0.45 0.03 280);
  --text-muted: oklch(0.6 0.02 280);
  --border: oklch(0.85 0.01 280 / 0.5);
  --border-hover: oklch(0.7 0.05 260 / 0.6);
  --accent: oklch(0.55 0.2 260);
  --accent-glow: oklch(0.55 0.2 260 / 0.15);
  --accent-gradient: linear-gradient(135deg, oklch(0.55 0.2 260), oklch(0.6 0.18 310));
  --green: oklch(0.55 0.18 150);
  --amber: oklch(0.65 0.18 85);
  --red: oklch(0.55 0.2 25);
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.06);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.08);
  --shadow-lg: 0 8px 32px oklch(0 0 0 / 0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
:root.dark{
  --bg-page: oklch(0.13 0.015 280);
  --bg-card: oklch(0.2 0.015 280 / 0.6);
  --bg-card-hover: oklch(0.25 0.015 280 / 0.7);
  --bg-glass: oklch(0.2 0.015 280 / 0.3);
  --text-primary: oklch(0.92 0.01 280);
  --text-secondary: oklch(0.7 0.02 280);
  --text-muted: oklch(0.5 0.02 280);
  --border: oklch(0.3 0.01 280 / 0.5);
  --border-hover: oklch(0.45 0.05 260 / 0.5);
  --accent: oklch(0.65 0.2 260);
  --accent-glow: oklch(0.65 0.2 260 / 0.12);
  --accent-gradient: linear-gradient(135deg, oklch(0.65 0.2 260), oklch(0.7 0.18 310));
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 8px 32px oklch(0 0 0 / 0.4);
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg-page);
  color:var(--text-primary);
  line-height:1.6;
  min-height:100dvh;
  transition:background 0.4s ease,color 0.4s ease;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  padding:3rem 1.5rem 2.5rem;
  text-align:center;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:var(--accent-gradient);
  opacity:0.06;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent);
}
.hero-content{position:relative;max-width:700px;margin:0 auto}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 14px;border-radius:100px;
  font-size:0.75rem;font-weight:600;letter-spacing:0.3px;
  background:var(--accent-glow);color:var(--accent);
  margin-bottom:1rem;
  border:1px solid var(--border);
}
.hero h1{
  font-size:clamp(1.8rem, 5vw, 2.8rem);
  font-weight:800;letter-spacing:-0.02em;
  margin-bottom:0.5rem;
  background:var(--accent-gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{
  font-size:clamp(0.95rem, 2vw, 1.1rem);
  color:var(--text-secondary);
  max-width:520px;margin:0 auto 1.2rem;
}
.hero-stats{
  display:flex;justify-content:center;gap:2rem;
  padding-top:0.8rem;
}
.stat{text-align:center}
.stat-num{
  font-size:1.6rem;font-weight:800;
  font-variant-numeric:tabular-nums;
  background:var(--accent-gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.stat-label{font-size:0.8rem;color:var(--text-muted);margin-top:-2px}

/* ===== THEME TOGGLE ===== */
.theme-toggle{
  position:fixed;top:1.2rem;right:1.2rem;z-index:100;
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border);
  background:var(--bg-glass);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  cursor:pointer;font-size:1.1rem;
  display:grid;place-items:center;
  transition:all 0.3s ease;
  color:var(--text-primary);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.theme-toggle:hover{
  border-color:var(--accent);
  transform:scale(1.08);
}
.theme-toggle .icon-sun{display:inline}
.theme-toggle .icon-moon{display:none}
:root.dark .theme-toggle .icon-sun{display:none}
:root.dark .theme-toggle .icon-moon{display:inline}

/* ===== CLOCK & DATE ===== */
.header-info{
  position:fixed;top:1.2rem;left:1.2rem;z-index:100;
  display:flex;align-items:center;gap:0.6rem;
  font-family:var(--font-mono);
}
.header-clock{
  font-size:0.85rem;font-weight:600;
  color:var(--text-primary);
  background:var(--bg-glass);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);
  font-variant-numeric:tabular-nums;
  letter-spacing:0.5px;
}
.header-date{
  font-size:0.75rem;
  color:var(--text-muted);
  background:var(--bg-glass);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);
} 

/* ===== SEARCH BAR ===== */
.search-section{
  padding:0 1.5rem 1.5rem;
  max-width:1200px;margin:0 auto;
}
.search-wrap{
  position:relative;
  max-width:500px;margin:0 auto;
}
.search-wrap input{
  width:100%;padding:0.75rem 1rem 0.75rem 2.6rem;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  background:var(--bg-glass);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  font-size:0.9rem;color:var(--text-primary);
  outline:none;transition:all 0.3s;
  font-family:var(--font-sans);
}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.search-icon{
  position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:0.9rem;
  pointer-events:none;
}

/* ===== FILTER TABS ===== */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:0.4rem;
  justify-content:center;
  padding:0 1.5rem 1.8rem;
  max-width:1200px;margin:0 auto;
}
.filter-btn{
  padding:0.35rem 0.9rem;border-radius:100px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-secondary);
  font-size:0.8rem;font-weight:500;
  cursor:pointer;transition:all 0.25s;
  font-family:var(--font-sans);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{
  background:var(--accent);color:white;
  border-color:var(--accent);
}

/* ===== PROJECT GRID ===== */
.grid-section{
  padding:0 1.5rem 3rem;
  max-width:1200px;margin:0 auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(min(100%, 340px), 1fr));
  gap:1rem;
  container-type:inline-size;
}

/* ===== PROJECT CARD ===== */
.card{
  position:relative;
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.5rem;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.22,1,0.36,1);
  overflow:hidden;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.card::before{
  content:'';
  position:absolute;inset:0;
  background:var(--accent-gradient);
  opacity:0;transition:opacity 0.4s;
  border-radius:inherit;
  pointer-events:none;
}
.card:hover{
  border-color:var(--border-hover);
  transform:translateY(-3px);
  box-shadow:var(--shadow-lg);
}
.card:hover::before{opacity:0.04}
.card:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

.card-icon{
  width:44px;height:44px;
  border-radius:var(--radius-sm);
  display:grid;place-items:center;
  font-size:1.4rem;
  margin-bottom:0.8rem;
  background:var(--accent-glow);
}
.card h3{
  font-size:1.05rem;font-weight:700;
  margin-bottom:0.3rem;
  letter-spacing:-0.01em;
}
.card p{
  font-size:0.85rem;color:var(--text-secondary);
  line-height:1.5;margin-bottom:0.8rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-meta{
  display:flex;align-items:center;gap:0.6rem;
  flex-wrap:wrap;
}
.card-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:100px;
  font-size:0.7rem;font-weight:600;
  background:var(--accent-glow);color:var(--accent);
  border:1px solid var(--border);
}
.card-badge.ready{background:oklch(0.55 0.18 150 / 0.12);color:var(--green);border-color:oklch(0.55 0.18 150 / 0.25)}
.card-badge.draft{background:oklch(0.65 0.18 85 / 0.12);color:var(--amber);border-color:oklch(0.65 0.18 85 / 0.25)}
.card-files{
  font-size:0.75rem;color:var(--text-muted);
  margin-left:auto;
}

/* Card entrance animation */
.card{
  view-transition-name:auto;
  @starting-style{opacity:0;transform:translateY(16px)}
}

/* ===== RIPPLE EFFECT ===== */
.ripple{
  position:absolute;border-radius:50%;
  background:var(--accent);
  transform:scale(0);
  animation:ripple-anim 0.6s ease-out;
  pointer-events:none;
  opacity:0.15;
}
@keyframes ripple-anim{
  to{transform:scale(4);opacity:0}
}

/* ===== DIALOG (Project Detail) ===== */
.dialog-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.6);
  display:none;place-items:center;
  padding:1rem;
}
.dialog-overlay.open{display:grid}

.dialog{
  background:#fff;
  color:#1d1d1f;
  border:1px solid rgba(0,0,0,0.12);
  border-radius:var(--radius-lg);
  max-width:560px;width:100%;
  max-height:85vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:2rem;
}
:root.dark .dialog{
  background:#1c1c1e;
  color:#f5f5f7;
  border-color:rgba(255,255,255,0.12);
}
.dialog-overlay.open .dialog{display:grid}
.dialog-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:1.5rem;
}
.dialog-title{
  display:flex;align-items:center;gap:0.6rem;
}
.dialog-title .icon{font-size:1.8rem}
.dialog-title h2{font-size:1.3rem;font-weight:700}
.dialog-close{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);
  cursor:pointer;font-size:1rem;
  display:grid;place-items:center;
  transition:all 0.2s;flex-shrink:0;
  font-family:var(--font-sans);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.dialog-close:hover{border-color:var(--accent);color:var(--accent)}
.dialog-desc{color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;line-height:1.6}
.dialog-section{margin-bottom:1.2rem}
.dialog-section h4{
  font-size:0.8rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.5px;color:var(--text-muted);
  margin-bottom:0.6rem;
}
.file-list{list-style:none;display:flex;flex-direction:column;gap:0.4rem}
.file-item{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.5rem 0.7rem;
  border-radius:var(--radius-sm);
  background:var(--bg-glass);
  border:1px solid var(--border);
  font-size:0.85rem;
  transition:all 0.2s;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.file-item:hover{border-color:var(--accent)}
.file-item .name{font-family:var(--font-mono);font-size:0.8rem;word-break:break-all}
.file-item .status{
  margin-left:auto;font-size:0.7rem;
  padding:1px 8px;border-radius:100px;
  background:oklch(0.65 0.18 85 / 0.12);color:var(--amber);
  white-space:nowrap;
  border:1px solid oklch(0.65 0.18 85 / 0.2);
}
.empty-state{
  text-align:center;padding:2rem 1rem;
  color:var(--text-muted);font-size:0.85rem;
}
.empty-state .big-icon{font-size:2.5rem;margin-bottom:0.5rem;display:block}

/* ===== FOOTER ===== */
footer{
  text-align:center;padding:2rem 1.5rem;
  color:var(--text-muted);font-size:0.8rem;
  border-top:1px solid var(--border);
  margin-top:2rem;
}
footer a{color:var(--accent);text-decoration:none}

/* ===== SCROLLBAR ===== */
:root{scrollbar-color:var(--text-muted) transparent;scrollbar-width:thin}

/* ===== RESPONSIVE ===== */
@container (max-width: 400px){
  .card{padding:1.2rem}
  .card-icon{width:36px;height:36px;font-size:1.1rem}
  .card h3{font-size:0.95rem}
  .dialog{padding:1.2rem}
}
@media (max-width:640px){
  .hero{padding:2rem 1rem 1.5rem}
  .hero-stats{gap:1.2rem}
  .grid{gap:0.8rem}
  .filter-bar{padding-bottom:1.2rem}
  .dialog{padding:1.2rem;max-height:90vh;max-height:90dvh}
  .header-info{top:0.8rem;left:0.8rem;gap:0.4rem}
  .header-clock{font-size:0.7rem;padding:3px 8px}
  .header-date{display:none}
}
</style>
</head>

// ===== RENDER =====
function renderGrid(list){
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = list.map(p => `
    <div class="card" tabindex="0" role="button" onclick="openDialog('${p.id}')" data-id="${p.id}" data-filter="${p.filter}" data-name="${p.name}">
      <div class="card-icon">${p.icon}</div>
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="card-meta">
        <span class="card-badge ${p.status}">${p.status === 'ready' ? '✅ 已就绪' : '📝 草稿'}</span>
        <span class="card-files">${p.files} 个文件</span>
      </div>
    </div>
  `).join('');
}

// ===== FILTER =====
let currentFilter = 'all';

function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  filterProjects();
}

function filterProjects(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = projects.filter(p => {
    const matchFilter = currentFilter === 'all' || p.filter === currentFilter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  renderGrid(filtered);
}

// ===== DIALOG =====
function openDialog(id){
  alert('open: ' + id);
  const p = projects.find(x => x.id === id);
  if(!p) return;
  document.getElementById('dialogIcon').textContent = p.icon;
  document.getElementById('dialogTitle').textContent = p.name;
  document.getElementById('dialogDesc').textContent = p.desc;

  const list = document.getElementById('dialogFiles');
  if(p.filesList && p.filesList.length > 0){
    list.innerHTML = '<ul class="file-list">' + p.filesList.map(f => {
      const status = f.uploaded
        ? '<span class="status" style="background:oklch(0.55 0.18 150 / 0.12);color:var(--green);border-color:oklch(0.55 0.18 150 / 0.25)">✅ 已上传</span>'
        : '<span class="status">待上传</span>';
      if(!f.uploaded){
        return `
          <li class="file-item" style="cursor:default">
            <span>📄</span>
            <span class="name" style="flex:1;color:var(--text-muted)">${f.name}</span>
            ${status}
          </li>
        `;
      }
      const href = `projects/${p.id}/${encodeURIComponent(f.name)}`;
      return `
        <a href="${href}" target="_blank" rel="noopener" class="file-item" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:0.5rem">
          <span>📄</span>
          <span class="name" style="flex:1">${f.name}</span>
          ${status}
        </a>
      `;
    }).join('') + '</ul>';
  } else {
    list.innerHTML = `<div class="empty-state"><span class="big-icon">📭</span>尚未上传文件<br>如需上传请通知 Hermes</div>`;
  }

  // Open dialog
  var overlay = document.getElementById('dialogOverlay');
  overlay.style.display = 'grid';
  overlay.classList.add('open');

  window.__scrollY = window.scrollY;
  document.documentElement.style.overflow = 'hidden';
  document.body.style.overflow = 'hidden';
}

function closeDialog(e){
  if(e && e.target !== document.getElementById('dialogOverlay')) return;
  var overlay = document.getElementById('dialogOverlay');
  overlay.style.display = 'none';
  overlay.classList.remove('open');
  document.documentElement.style.overflow = '';
  document.body.style.overflow = '';
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.width = '';
  if(window.__scrollY !== undefined){
    window.scrollTo(0, window.__scrollY);
    window.__scrollY = undefined;
  }
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDialog({target:document.getElementById('dialogOverlay')}) });

// ===== CARD CLICK / TAP DELEGATION =====
// touchend for mobile (immediate, no ghost click)
var _touchStartX = 0, _touchStartY = 0;

document.getElementById('projectGrid').addEventListener('touchstart', function(e){
  var t = e.touches[0];
  _touchStartX = t.clientX;
  _touchStartY = t.clientY;
}, {passive: true});

document.getElementById('projectGrid').addEventListener('touchend', function(e){
  var t = e.changedTouches[0];
  var dx = Math.abs(t.clientX - _touchStartX);
  var dy = Math.abs(t.clientY - _touchStartY);
  // Only handle taps (finger moved < 10px = not a scroll/swipe)
  if(dx < 10 && dy < 10){
    var card = e.target.closest('.card');
    if(!card) return;
    var id = card.getAttribute('data-id');
    if(!id) return;
    e.preventDefault(); // prevent ghost click
    openDialog(id);
  }
});

// click fallback for desktop / non-touch devices
document.getElementById('projectGrid').addEventListener('click', function(e){
  var card = e.target.closest('.card');
  if(!card) return;
  var id = card.getAttribute('data-id');
  if(!id) return;
  openDialog(id);
});

document.getElementById('projectGrid').addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  var card = e.target.closest('.card');
  if(!card) return;
  var id = card.getAttribute('data-id');
  if(!id) return;
  openDialog(id);
});

// ===== CLOCK & DATE =====
function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').textContent = `${hh}:${mm}:${ss}`;
  const weekdays = ['日','一','二','三','四','五','六'];
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const w = weekdays[now.getDay()];
  document.getElementById('dateDisplay').textContent = `${y}年${m}月${d}日 周${w}`;
}
setInterval(updateClock,1000);
updateClock();

// ===== THEME =====
function toggleTheme(){
  const isDark = document.documentElement.classList.toggle('dark');
  const meta = document.querySelector('meta[name="color-scheme"]');
  if(isDark){
    meta.content = 'dark';
    localStorage.setItem('theme','dark');
  } else {
    meta.content = 'light dark';
    localStorage.removeItem('theme');
  }
  localStorage.setItem('color-scheme', meta.content);
}

// ===== UPDATE STATS =====
function updateStats(){
  const totalProj = projects.length;
  const totalFiles = projects.reduce((sum, p) => sum + (p.filesList ? p.filesList.length : 0), 0);
  const maxVer = Math.max(...projects.map(p => p.versions || 1));
  document.getElementById('totalProjects').textContent = totalProj;
  document.getElementById('totalFiles').textContent = totalFiles;
  document.getElementById('totalVersions').textContent = maxVer;
}

// ===== INIT =====
updateStats();
renderGrid(projects);
</script>
