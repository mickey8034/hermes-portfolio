<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>HERMES PORTFOLIO // 项目终端</title>
<meta name="description" content="Hermes Agent 数据分析作品集 — 终端风格项目目录">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌘</text></svg>">
<script>
(function(){
  var saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.classList.add('light');
})();
</script>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan: #00f0ff;
  --cyan-dim: rgba(0,240,255,0.08);
  --cyan-glow: rgba(0,240,255,0.25);
  --magenta: #ff2d95;
  --blue: #4466ff;
  --green: #00ff88;
  --amber: #ffb347;
  --bg-deep: #0a0a0f;
  --bg-card: rgba(12,12,24,0.75);
  --bg-hover: rgba(0,240,255,0.05);
  --text-bright: #e0e8f0;
  --text-dim: rgba(180,200,220,0.6);
  --text-muted: rgba(120,140,160,0.5);
  --border: rgba(0,240,255,0.12);
  --border-active: rgba(0,240,255,0.35);
  --radius: 8px;
  --font-mono: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Inter','PingFang SC','Microsoft YaHei',sans-serif;
}
:root.light{
  --cyan: #0066ff;
  --cyan-dim: rgba(0,102,255,0.06);
  --cyan-glow: rgba(0,102,255,0.15);
  --bg-deep: #f0f4f8;
  --bg-card: rgba(255,255,255,0.7);
  --bg-hover: rgba(0,102,255,0.04);
  --text-bright: #0a1628;
  --text-dim: rgba(60,80,100,0.7);
  --text-muted: rgba(100,120,140,0.5);
  --border: rgba(0,102,255,0.15);
  --border-active: rgba(0,102,255,0.3);
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg-deep);
  color:var(--text-bright);
  line-height:1.6;
  min-height:100dvh;
  overflow-x:hidden;
}

/* ===== CYBER GRID BACKGROUND ===== */
body::before{
  content:'';
  position:fixed;inset:0;
  z-index:-1;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black, transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black, transparent 70%);
  pointer-events:none;
}

/* ===== SCAN LINE ===== */
body::after{
  content:'';
  position:fixed;inset:0;
  z-index:-1;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.015) 2px, rgba(0,240,255,0.015) 4px);
  pointer-events:none;
}

/* ===== THEME TOGGLE ===== */
.theme-toggle{
  position:fixed;top:1rem;right:1rem;z-index:100;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);
  background:var(--bg-card);
  backdrop-filter:blur(8px);
  cursor:pointer;font-size:0.9rem;
  display:grid;place-items:center;
  transition:all 0.3s;
  color:var(--text-dim);
  font-family:var(--font-mono);
}
.theme-toggle:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow)}
.light .theme-toggle .dark-label{display:none}
.theme-toggle .light-label{display:none}
.light .theme-toggle .light-label{display:inline}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-active)}

/* ===== TERMINAL HEADER BAR ===== */
.term-bar{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.6rem 1.2rem;
  border-bottom:1px solid var(--border);
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:50;
  font-family:var(--font-mono);
  font-size:0.75rem;
}
.term-dots{display:flex;gap:5px}
.term-dot{width:8px;height:8px;border-radius:50%}
.term-dot:nth-child(1){background:#ff5f56}
.term-dot:nth-child(2){background:#ffbd2e}
.term-dot:nth-child(3){background:#27c93f}
.term-path{
  color:var(--text-muted);margin-left:0.6rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.term-path .prompt{color:var(--green)}
.term-path .dir{color:var(--cyan)}

/* ===== HERO ===== */
.hero{
  padding:3rem 1.5rem 1.5rem;
  text-align:center;
  position:relative;
}
.hero-glow{
  position:absolute;top:-120px;left:50%;transform:translateX(-50%);
  width:500px;height:300px;
  background:radial-gradient(ellipse, var(--cyan-glow) 0%, transparent 70%);
  pointer-events:none;
  z-index:-1;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 12px;margin-bottom:0.8rem;
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-family:var(--font-mono);
  font-size:0.7rem;letter-spacing:0.5px;
  color:var(--text-dim);
  background:var(--bg-card);
}
.hero-badge .blink{
  display:inline-block;width:6px;height:6px;
  background:var(--green);border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.hero h1{
  font-family:var(--font-mono);
  font-size:clamp(1.6rem,5vw,2.6rem);
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:0.4rem;
}
.hero h1 .hl{color:var(--cyan)}
.hero h1 .hl2{color:var(--magenta)}
.hero .subtitle{
  font-family:var(--font-mono);
  font-size:clamp(0.7rem,1.8vw,0.85rem);
  color:var(--text-dim);
  letter-spacing:2px;
  margin-bottom:1.5rem;
}
.hero .subtitle .cursor{animation:blink-cursor 1s step-end infinite;color:var(--cyan)}
@keyframes blink-cursor{50%{opacity:0}}

.hero-stats{
  display:flex;justify-content:center;gap:2.5rem;
  padding:1rem 0;
}
.stat{text-align:center}
.stat-num{
  font-family:var(--font-mono);
  font-size:1.5rem;font-weight:700;
  color:var(--cyan);
  font-variant-numeric:tabular-nums;
}
.stat-label{
  font-family:var(--font-mono);
  font-size:0.65rem;letter-spacing:1px;
  color:var(--text-muted);margin-top:0;
}

/* ===== SEARCH ===== */
.search-wrap{
  max-width:480px;margin:0.5rem auto 1rem;
  padding:0 1.5rem;
  position:relative;
}
.search-wrap input{
  width:100%;
  padding:0.65rem 1rem 0.65rem 2.4rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-bright);
  font-family:var(--font-mono);
  font-size:0.8rem;
  outline:none;
  transition:all 0.3s;
}
.search-wrap input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 2px var(--cyan-glow);
}
.search-wrap input::placeholder{color:var(--text-muted);font-family:var(--font-mono)}
.search-icon{
  position:absolute;left:2rem;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-family:var(--font-mono);font-size:0.75rem;
  pointer-events:none;
}

/* ===== FILTER TABS ===== */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:0.3rem;
  justify-content:center;padding:0 1.5rem 1.2rem;
}
.filter-btn{
  padding:0.3rem 0.8rem;
  background:transparent;
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-dim);
  font-family:var(--font-mono);
  font-size:0.7rem;letter-spacing:0.3px;
  cursor:pointer;
  transition:all 0.25s;
}
.filter-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.filter-btn.active{
  background:var(--cyan-dim);
  border-color:var(--cyan);
  color:var(--cyan);
  box-shadow:0 0 8px var(--cyan-glow);
}

/* ===== GRID ===== */
.grid-section{padding:0 1.5rem 3rem}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(min(100%, 320px), 1fr));
  gap:0.8rem;
  max-width:1100px;margin:0 auto;
}

/* ===== CARD ===== */
.card{
  position:relative;
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.2rem 1.2rem 1rem;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity:0;
  transition:opacity 0.4s;
}
.card:hover{
  border-color:var(--border-active);
  transform:translateY(-2px);
  background:var(--bg-hover);
}
.card:hover::before{opacity:1}
.card:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

.card-header{
  display:flex;align-items:center;gap:0.6rem;
  margin-bottom:0.5rem;
}
.card-icon{
  width:32px;height:32px;border-radius:4px;
  background:var(--cyan-dim);
  border:1px solid var(--border);
  display:grid;place-items:center;
  font-size:1rem;
  flex-shrink:0;
}
.card h3{
  font-family:var(--font-mono);
  font-size:0.85rem;font-weight:600;
  letter-spacing:0.3px;
}
.card p{
  font-size:0.78rem;color:var(--text-dim);
  line-height:1.5;
  margin-bottom:0.7rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{
  display:flex;align-items:center;gap:0.5rem;
  flex-wrap:wrap;
}
.card-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:1px 8px;border-radius:3px;
  font-family:var(--font-mono);font-size:0.65rem;
  border:1px solid var(--border);
  color:var(--text-dim);
  background:var(--cyan-dim);
}
.card-badge.ready{border-color:rgba(0,255,136,0.3);color:var(--green);background:rgba(0,255,136,0.06)}
.card-files{
  font-family:var(--font-mono);
  font-size:0.65rem;color:var(--text-muted);
  margin-left:auto;
}

/* ===== DIALOG ===== */
.dialog-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:grid;place-items:center;
  padding:1rem;
  opacity:0;visibility:hidden;
  transition:all 0.3s;
}
.dialog-overlay.open{opacity:1;visibility:visible}
.dialog{
  background:var(--bg-card);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  max-width:540px;width:100%;
  max-height:85dvh;overflow-y:auto;
  padding:1.5rem;
  transform:scale(0.95);
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
}
.dialog-overlay.open .dialog{transform:scale(1)}
.dialog-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:1rem;
  padding-bottom:0.8rem;
  border-bottom:1px solid var(--border);
}
.dialog-title{
  display:flex;align-items:center;gap:0.5rem;
  font-family:var(--font-mono);
}
.dialog-title .icon{font-size:1.2rem}
.dialog-title h2{font-size:0.95rem;font-weight:600;letter-spacing:0.5px}
.dialog-close{
  width:28px;height:28px;border-radius:4px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-dim);
  cursor:pointer;font-size:0.8rem;
  display:grid;place-items:center;
  transition:all 0.2s;
  font-family:var(--font-mono);
}
.dialog-close:hover{border-color:var(--magenta);color:var(--magenta)}
.dialog-desc{
  font-size:0.8rem;color:var(--text-dim);
  margin-bottom:1.2rem;line-height:1.6;
}
.dialog-section h4{
  font-family:var(--font-mono);
  font-size:0.7rem;letter-spacing:1px;
  color:var(--text-muted);
  margin-bottom:0.5rem;
}
.file-list{list-style:none;display:flex;flex-direction:column;gap:0.3rem}
.file-item{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.4rem 0.6rem;
  border:1px solid var(--border);
  border-radius:4px;
  background:rgba(0,0,0,0.2);
  transition:all 0.2s;
}
.file-item:hover{border-color:var(--cyan);background:var(--cyan-dim)}
.file-item .name{
  font-family:var(--font-mono);
  font-size:0.72rem;word-break:break-all;
  text-decoration:none;color:inherit;flex:1;
}
.file-item .name:hover{color:var(--cyan)}
.file-item .status{
  font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.3px;
  padding:1px 6px;border-radius:3px;
  white-space:nowrap;
  border:1px solid var(--border);
  color:var(--text-muted);
}
.file-item .status.uploaded{
  color:var(--green);
  border-color:rgba(0,255,136,0.25);
  background:rgba(0,255,136,0.06);
}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:1.5rem;color:var(--text-muted)}
.empty-state .big-icon{font-size:2rem;display:block;margin-bottom:0.3rem}

/* ===== FOOTER ===== */
footer{
  text-align:center;padding:1.5rem;
  border-top:1px solid var(--border);
  margin-top:1rem;
  font-family:var(--font-mono);
  font-size:0.65rem;letter-spacing:0.5px;
  color:var(--text-muted);
}
footer a{color:var(--cyan);text-decoration:none}
footer a:hover{text-decoration:underline}

/* ===== GLITCH TEXT ===== */
.glitch{position:relative}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0;
}
.glitch:hover::before{
  color:var(--magenta);
  opacity:0.6;
  animation:glitch1 0.3s ease;
  clip-path:inset(20% 0 50% 0);
}
.glitch:hover::after{
  color:var(--cyan);
  opacity:0.6;
  animation:glitch2 0.3s ease 0.05s;
  clip-path:inset(60% 0 10% 0);
}
@keyframes glitch1{0%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px)}80%{transform:translate(1px,1px)}100%{transform:translate(0)}}
@keyframes glitch2{0%{transform:translate(0)}20%{transform:translate(2px,-1px)}40%{transform:translate(-2px,1px)}60%{transform:translate(1px)}80%{transform:translate(-1px,-1px)}100%{transform:translate(0)}}

/* ===== RESPONSIVE ===== */
@media (max-width:640px){
  .hero{padding:2rem 1rem 1rem}
  .hero-stats{gap:1.5rem}
  .grid{gap:0.6rem}
  .term-bar{padding:0.4rem 0.8rem;font-size:0.65rem}
  .dialog{padding:1rem}
}
</style>
</head>
<body>

// ===== RENDER =====
function renderGrid(list){
  document.getElementById('projectGrid').innerHTML = list.map(p => `
    <div class="card" tabindex="0" role="button"
         onclick="openDialog('${p.id}')" onkeydown="if(event.key==='Enter')openDialog('${p.id}')">
      <div class="card-header">
        <div class="card-icon">${p.icon}</div>
        <h3>${p.name}</h3>
      </div>
      <p>${p.desc}</p>
      <div class="card-footer">
        <span class="card-badge ${p.status}">${p.status==='ready'?'● ONLINE':'○ DRAFT'}</span>
        <span class="card-files">${p.files} FILE${p.files!==1?'S':''}</span>
      </div>
    </div>
  `).join('');
}

// ===== FILTER =====
let currentFilter = 'all';
function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  filterProjects();
}
function filterProjects(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderGrid(projects.filter(p => {
    const mf = currentFilter === 'all' || p.filter === currentFilter;
    const ms = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return mf && ms;
  }));
}

// ===== DIALOG =====
function openDialog(id){
  const p = projects.find(x => x.id === id);
  if(!p) return;
  document.getElementById('dialogIcon').textContent = p.icon;
  document.getElementById('dialogTitle').textContent = p.name.toUpperCase();
  document.getElementById('dialogDesc').textContent = p.desc;
  const list = document.getElementById('dialogFiles');
  if(p.filesList && p.filesList.length > 0){
    list.innerHTML = '<div class="file-list">' + p.filesList.map(f => {
      const cls = f.uploaded ? 'uploaded' : '';
      const label = f.uploaded ? 'ONLINE' : 'PENDING';
      const href = f.uploaded ? `projects/${encodeURIComponent(p.id)}/${encodeURIComponent(f.name)}` : '#';
      return `<div class="file-item"><span>📄</span><a href="${href}" target="_blank" class="name">${f.name}</a><span class="status ${cls}">${label}</span></div>`;
    }).join('') + '</div>';
  } else {
    list.innerHTML = '<div class="empty-state"><span class="big-icon">∅</span>NO FILES UPLOADED</div>';
  }
  document.getElementById('dialogOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDialog(e){
  if(e && e.target !== document.getElementById('dialogOverlay')) return;
  document.getElementById('dialogOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDialog({target:document.getElementById('dialogOverlay')}) });

// ===== THEME =====
function toggleTheme(){
  document.documentElement.classList.toggle('light');
  const isLight = document.documentElement.classList.contains('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// ===== INIT =====
renderGrid(projects);
